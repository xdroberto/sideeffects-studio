server {
    server_name sideeffects.robertobh.dev;

    root /var/www/sideeffects;
    index index.html;

    error_page 404 /404.html;

    # Server-only routes are not part of the static production surface.
    location ^~ /api/ {
        return 404;
    }

    location ^~ /admin/ {
        return 404;
    }

    location = /admin {
        return 404;
    }

    location ^~ /sf01-internal/ {
        return 404;
    }

    location ^~ /chord-lab-internal/ {
        return 404;
    }

    location /_next/static/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }

    location /uploads/ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/sideeffects.robertobh.dev/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/sideeffects.robertobh.dev/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
